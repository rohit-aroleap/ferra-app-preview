<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover,user-scalable=no" />
  <meta name="theme-color" content="#0A0A0A" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Ferra" />
  <title>Ferra · Compare v3 / v6 — build v24</title>
  <style>
    html, body {
      margin: 0; padding: 0;
      background: #0A0A0A;
      height: 100%;
      overflow: hidden;
      overscroll-behavior: none;
      font-family: -apple-system, BlinkMacSystemFont, sans-serif;
    }
    .swiper {
      position: fixed;
      inset: 0;
      display: flex;
      overflow-x: auto;
      overflow-y: hidden;
      scroll-snap-type: x mandatory;
      scroll-behavior: smooth;
      scrollbar-width: none;
    }
    .swiper::-webkit-scrollbar { display: none; }
    .page {
      flex: 0 0 100vw;
      height: 100dvh;
      scroll-snap-align: start;
      scroll-snap-stop: always;
    }
    .page iframe {
      width: 100%; height: 100%;
      border: 0;
      display: block;
      background: #0A0A0A;
    }

    /* Top pill: shows current page + tappable to switch */
    .page-indicator {
      position: fixed;
      top: calc(env(safe-area-inset-top, 4px) + 6px);
      left: 50%;
      transform: translateX(-50%);
      z-index: 100;
      background: rgba(15, 15, 17, 0.78);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      border: 1px solid rgba(255, 255, 255, 0.08);
      border-radius: 999px;
      padding: 3px;
      display: flex;
      gap: 2px;
      box-shadow: 0 4px 14px rgba(0, 0, 0, 0.4);
    }
    .page-indicator button {
      background: transparent;
      border: 0;
      cursor: pointer;
      padding: 6px 14px;
      border-radius: 999px;
      color: #888;
      font: 600 12px/1 inherit;
      letter-spacing: 0.06em;
      transition: background .2s ease, color .2s ease;
      min-width: 44px;
    }
    .page-indicator button.active {
      background: #E97A2F;
      color: #fff;
    }

    /* Fullscreen hint */
    #fs-hint {
      position: fixed; inset: 0; z-index: 99999;
      display: flex; align-items: center; justify-content: center;
      background: rgba(0, 0, 0, 0.6);
      backdrop-filter: blur(4px); -webkit-backdrop-filter: blur(4px);
      color: #fff;
      font: 600 17px/1.4 inherit;
      text-align: center; padding: 24px;
      transition: opacity .25s ease;
    }
    #fs-hint.hide { opacity: 0; pointer-events: none; }
    #fs-hint .box {
      background: #1c1c1f;
      border: 1px solid rgba(255, 255, 255, 0.08);
      border-radius: 16px;
      padding: 22px 26px;
      max-width: 340px;
    }
    #fs-hint .sub { color: #aaa; font-weight: 400; font-size: 14px; margin-top: 10px; }
    #fs-hint .dot { color: #E97A2F; }
    #fs-hint .ver {
      margin-top: 14px;
      padding-top: 12px;
      border-top: 1px solid rgba(255, 255, 255, 0.06);
      font-weight: 500;
      font-size: 13px;
      color: #888;
      letter-spacing: 0.05em;
      font-variant-numeric: tabular-nums;
    }
    #fs-hint .ver b { color: #E97A2F; font-weight: 600; }
    #fs-hint .share-ico {
      display: inline-block; vertical-align: -3px;
      width: 18px; height: 18px;
      margin: 0 2px;
    }
    #fs-hint .tip { color: #777; font-weight: 400; font-size: 12px; margin-top: 8px; font-style: italic; }
  </style>
</head>
<body>
  <div class="swiper" id="swiper">
    <div class="page"><iframe src="v3.html" loading="eager" title="Design v3"></iframe></div>
    <div class="page"><iframe src="v6.html" loading="eager" title="Design v6"></iframe></div>
  </div>

  <div class="page-indicator" id="pageInd">
    <button data-i="0" class="active">v3</button>
    <button data-i="1">v6</button>
  </div>

  <div id="fs-hint">
    <div class="box" id="fs-hint-box">Loading...</div>
  </div>

  <script>
    /* Page indicator: tap to switch, scroll updates active dot */
    (function () {
      var swiper = document.getElementById('swiper');
      var buttons = document.querySelectorAll('#pageInd button');
      buttons.forEach(function (btn) {
        btn.addEventListener('click', function () {
          var i = parseInt(btn.dataset.i, 10);
          swiper.scrollTo({ left: i * window.innerWidth, behavior: 'smooth' });
        });
      });
      var ticking = false;
      swiper.addEventListener('scroll', function () {
        if (ticking) return;
        ticking = true;
        requestAnimationFrame(function () {
          var i = Math.round(swiper.scrollLeft / window.innerWidth);
          buttons.forEach(function (b, idx) { b.classList.toggle('active', idx === i); });
          ticking = false;
        });
      }, { passive: true });
    })();
  </script>

  <script>
    /* Fullscreen tap-to-arm overlay */
    (function () {
      var hint = document.getElementById('fs-hint');
      var box  = document.getElementById('fs-hint-box');
      var ua = navigator.userAgent || '';
      var isIOS = /iPad|iPhone|iPod/.test(ua) || (navigator.platform === 'MacIntel' && navigator.maxTouchPoints > 1);
      var inStandalone = (window.matchMedia && window.matchMedia('(display-mode: standalone)').matches) || window.navigator.standalone === true;
      var PREVIEW_VERSION = 'v24';
      var verLine = '<div class="ver">Compare v3 / v6 · Build <b>' + PREVIEW_VERSION + '</b></div>';
      var tipLine = '<div class="tip">Swipe sideways to compare designs</div>';

      if (inStandalone) {
        box.innerHTML =
          'Tap to start <span class="dot">.</span>' +
          '<div class="sub">Begin animation</div>' + tipLine + verLine;
        document.addEventListener('click', armAndDismiss, true);
        document.addEventListener('touchend', armAndDismiss, true);
        return;
      }
      if (isIOS) {
        box.innerHTML =
          'For fullscreen on iPhone <span class="dot">.</span><br>' +
          'Tap <svg class="share-ico" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">' +
          '<path d="M12 3v13"/><path d="M7 8l5-5 5 5"/><path d="M5 12v7a2 2 0 0 0 2 2h10a2 2 0 0 0 2-2v-7"/></svg>' +
          ' Share &rarr; "Add to Home Screen"' +
          '<div class="sub">Then launch it from the home icon. Tap anywhere to dismiss this hint.</div>' + tipLine + verLine;
        document.addEventListener('click', armAndDismiss, true);
        document.addEventListener('touchend', armAndDismiss, true);
        return;
      }
      box.innerHTML =
        'Tap anywhere for fullscreen <span class="dot">.</span>' +
        '<div class="sub">Hides browser bar &amp; system nav</div>' + tipLine + verLine;
      document.addEventListener('click', goFullscreen, true);
      document.addEventListener('touchend', goFullscreen, true);

      function goFullscreen() {
        var el = document.documentElement;
        var req = el.requestFullscreen || el.webkitRequestFullscreen || el.mozRequestFullScreen || el.msRequestFullscreen;
        if (req) { try { req.call(el); } catch (e) {} }
        if (screen.orientation && screen.orientation.lock) {
          try { screen.orientation.lock('portrait').catch(function(){}); } catch (e) {}
        }
        armAndDismiss();
      }
      function armAndDismiss() { arm(); dismiss(); }
      function arm() {
        if (document.body.classList.contains('armed')) return;
        document.body.classList.add('armed');
        // Tell each iframe to arm itself
        document.querySelectorAll('iframe').forEach(function (f) {
          var send = function () {
            try { f.contentWindow.postMessage({ type: 'ferra:arm' }, '*'); } catch (e) {}
          };
          send();
          // Send again after a tick in case the iframe is still loading
          setTimeout(send, 500);
          setTimeout(send, 1500);
        });
      }
      function dismiss() {
        hint.classList.add('hide');
        setTimeout(function () { if (hint.parentNode) hint.parentNode.removeChild(hint); }, 300);
        document.removeEventListener('click', goFullscreen, true);
        document.removeEventListener('touchend', goFullscreen, true);
        document.removeEventListener('click', armAndDismiss, true);
        document.removeEventListener('touchend', armAndDismiss, true);
      }
    })();
  </script>
</body>
</html>
