<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover,user-scalable=no" />
  <meta name="theme-color" content="#0A0A0A" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <title>Ferra · Home</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@600;700&family=Barlow:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg: #0A0A0A;
      --surface: #1C1C1E;
      --surface-2: #2A2A2C;
      --line: rgba(255,255,255,0.08);
      --fg: #FFFFFF;
      --fg-muted: #A8A8A8;
      --fg-subtle: #6E6E6E;
      --ember: #E97A2F;
      --ember-bright: #F58A3D;
      --ember-soft: rgba(233,122,47,0.18);
      --done: #1FBA4C;
      --done-deep: #169a3c;
      --miss: #6C2622;
      --font-body: "Barlow", -apple-system, system-ui, sans-serif;
      --font-display: "Barlow Condensed", "Barlow", -apple-system, system-ui, sans-serif;
    }

    html, body {
      margin: 0; padding: 0;
      background: #1a1a1d;
      min-height: 100vh;
      font-family: var(--font-body);
      color: var(--fg);
      -webkit-font-smoothing: antialiased;
    }

    .stage {
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 32px 16px;
      background:
        radial-gradient(ellipse 80% 50% at 50% 0%, #2a2a30 0%, #1a1a1d 60%);
    }

    /* ---------- Phone bezel ---------- */
    .phone {
      position: relative;
      width: 402px;
      height: 850px;
      border-radius: 54px;
      background: #0A0A0A;
      box-shadow:
        0 0 0 2px #1c1c1f,
        0 0 0 10px #2a2a2d,
        0 0 0 11px #0e0e10,
        0 60px 120px rgba(0,0,0,0.5);
      overflow: hidden;
      font-family: var(--font-body);
    }
    .phone .island {
      position: absolute;
      top: 11px; left: 50%; transform: translateX(-50%);
      width: 124px; height: 36px;
      border-radius: 22px;
      background: #000;
      z-index: 50;
    }
    .phone .island::after {
      content: "";
      position: absolute;
      top: 50%; right: 18px;
      transform: translateY(-50%);
      width: 8px; height: 8px;
      border-radius: 50%;
      background: #0F0F12;
      box-shadow: inset 0 0 0 1px #1a1d22, 0 0 0 1px rgba(40,80,120,0.4);
    }
    .phone .home-indicator {
      position: absolute;
      bottom: 8px; left: 50%; transform: translateX(-50%);
      width: 134px; height: 5px;
      border-radius: 100px;
      background: rgba(255,255,255,0.95);
      z-index: 60;
    }

    /* ---------- iOS Status bar ---------- */
    .status-bar {
      position: relative;
      z-index: 5;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 16px 30px 8px;
      color: #fff;
      font-weight: 600;
      font-size: 17px;
      font-variant-numeric: tabular-nums;
      letter-spacing: -0.01em;
    }
    .status-bar .right {
      display: flex; align-items: center; gap: 6px;
    }

    /* ---------- App content ---------- */
    .screen {
      position: absolute;
      inset: 0;
      background: var(--bg);
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }
    .content {
      flex: 1;
      min-height: 0;
      overflow: hidden;
      padding: 18px 22px 0;
      display: flex;
      flex-direction: column;
      gap: 22px;
    }

    /* ---------- Header ---------- */
    .header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      padding-top: 22px;
    }
    .header .greeting {
      display: flex;
      align-items: center;
      gap: 12px;
      min-width: 0;
    }
    .header .greeting .name {
      font-family: var(--font-body);
      font-weight: 600;
      font-size: 28px;
      line-height: 1;
      letter-spacing: -0.025em;
      color: #fff;
      white-space: nowrap;
    }
    .streak-pill {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 7px 16px 7px 12px;
      background: rgba(233, 122, 47, 0.10);
      border: 1px solid rgba(233, 122, 47, 0.28);
      border-radius: 999px;
      font-family: var(--font-body);
      font-weight: 400;
      font-size: 16px;
      letter-spacing: -0.01em;
      line-height: 1;
      color: rgba(255,255,255,0.92);
    }
    .streak-pill .count {
      color: var(--ember);
      font-weight: 600;
      font-size: 16px;
      font-variant-numeric: tabular-nums;
    }
    .streak-pill svg {
      width: 22px; height: 22px;
      flex-shrink: 0;
    }
    .menu-btn {
      background: transparent;
      border: none;
      padding: 4px;
      color: #fff;
      cursor: pointer;
      display: grid;
      place-items: center;
    }
    .menu-btn svg { width: 26px; height: 26px; }

    /* ---------- Section ---------- */
    .section-title {
      font-family: var(--font-body);
      font-weight: 600;
      font-size: 18px;
      color: #fff;
      margin: 0;
      letter-spacing: -0.02em;
      line-height: 1;
    }
    .section-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 14px;
    }

    /* ---------- Week strip ---------- */
    .week-card {
      background: #1F1F22;
      border: 1px solid rgba(255,255,255,0.04);
      border-radius: 14px;
      padding: 12px 8px 14px;
      display: grid;
      grid-template-columns: repeat(7, 1fr);
      gap: 4px;
    }
    .day {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 8px;
    }
    .day .dow {
      font-family: var(--font-body);
      font-weight: 600;
      font-size: 13px;
      color: #fff;
      letter-spacing: 0.02em;
    }
    .day.today .dow { color: var(--ember); }
    .day.future .dow,
    .day.future .cell { color: var(--fg-muted); }

    .cell {
      width: 30px; height: 30px;
      border-radius: 50%;
      display: grid;
      place-items: center;
      font-family: var(--font-body);
      font-weight: 600;
      font-size: 12px;
      font-variant-numeric: tabular-nums;
    }
    .cell.miss {
      background: #5A1F1B;
      color: #E25C50;
    }
    .cell.miss svg { width: 12px; height: 12px; }
    .cell.done {
      background: var(--done);
      color: #0A0A0A;
    }
    .cell.done svg { width: 14px; height: 14px; stroke: #0A0A0A; }
    .cell.future {
      background: transparent;
      border: 1px solid #3A3A3D;
      color: #B3B3B3;
    }
    .day.today .cell {
      box-shadow: 0 0 0 2px var(--ember);
    }

    /* ---------- Habit score ---------- */
    .habit-score {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }
    .habit-row {
      display: flex;
      align-items: baseline;
      justify-content: space-between;
      gap: 12px;
    }
    .habit-label {
      font-family: var(--font-body);
      font-weight: 500;
      font-size: 15px;
      color: var(--fg-muted);
      letter-spacing: -0.005em;
    }
    .habit-pct {
      font-family: var(--font-body);
      font-weight: 700;
      font-size: 15px;
      color: #fff;
      font-variant-numeric: tabular-nums;
      letter-spacing: -0.005em;
    }
    .habit-track {
      position: relative;
      height: 6px;
      background: #2A2A2C;
      border-radius: 999px;
      overflow: hidden;
    }
    .habit-fill {
      height: 100%;
      width: 50%;
      background: linear-gradient(90deg, #EC8237 0%, #E97A2F 100%);
      border-radius: 999px;
    }

    /* ---------- Exercise card ---------- */
    .exercise-card {
      background: #232326;
      border-radius: 22px;
      overflow: hidden;
      display: flex;
      flex-direction: column;
    }
    .exercise-card .img {
      height: 240px;
      position: relative;
      background: #2a2a2d;
      overflow: hidden;
    }
    .exercise-card .img img {
      width: 100%; height: 100%;
      object-fit: cover;
      display: block;
    }
    .exercise-card .img .placeholder {
      position: absolute; inset: 0;
      display: grid; place-items: center;
      color: var(--fg-subtle);
      font-size: 12px;
      letter-spacing: 0.05em;
      text-transform: uppercase;
    }
    .exercise-card .label {
      padding: 12px 18px 4px;
      font-family: var(--font-body);
      font-weight: 500;
      font-size: 18px;
      color: #fff;
      letter-spacing: -0.005em;
    }
    .exercise-card .cta {
      margin: 8px 12px 12px;
      background: linear-gradient(180deg, #EC8237 0%, #D86A22 100%);
      color: #fff;
      border: none;
      border-radius: 14px;
      padding: 16px;
      font-family: var(--font-body);
      font-weight: 600;
      font-size: 18px;
      cursor: pointer;
      letter-spacing: 0.005em;
      box-shadow: 0 4px 12px rgba(216,106,34,0.25);
    }
    .exercise-card .cta:active { transform: translateY(1px); }

    /* ---------- Tab bar ---------- */
    .tab-bar {
      position: relative;
      flex-shrink: 0;
      height: 92px;
      display: grid;
      grid-template-columns: 1fr 1fr 1fr;
      align-items: start;
      padding: 10px 28px 0;
      background: transparent;
    }
    .tab-item {
      background: transparent;
      border: none;
      padding: 8px 0 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 4px;
      color: var(--fg-muted);
      font-family: var(--font-body);
      font-weight: 500;
      font-size: 12px;
      cursor: pointer;
    }
    .tab-item svg { width: 24px; height: 24px; }
    .tab-item.active { color: var(--ember); }

    .fab-wrap {
      display: grid;
      place-items: center;
      position: relative;
    }
    .fab {
      width: 56px; height: 56px;
      border-radius: 50%;
      background: #1F1F22;
      border: 1px solid rgba(255,255,255,0.06);
      display: grid;
      place-items: center;
      cursor: pointer;
      margin-top: -4px;
      box-shadow:
        0 6px 16px rgba(0,0,0,0.5),
        inset 0 0 0 1px rgba(255,255,255,0.02);
    }
    .ferra-mark {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      grid-template-rows: repeat(4, 1fr);
      gap: 1.5px;
      width: 22px; height: 22px;
    }
    .ferra-mark .dot {
      width: 100%; aspect-ratio: 1;
      border-radius: 50%;
      background: var(--ember);
    }
    .ferra-mark .dot.off { background: transparent; }
  
    /* ===== Fullscreen-on-real-phone overrides (added) ===== */
    html, body {
      background: #0A0A0A;
      height: 100%;
      overflow: hidden;
      overscroll-behavior: none;
    }
    .stage {
      min-height: 100vh;
      min-height: 100dvh;
      padding: 0;
      background: #0A0A0A;
      display: block;
    }
    .phone {
      width: 100vw !important;
      height: 100vh !important;
      height: 100dvh !important;
      border-radius: 0 !important;
      box-shadow: none !important;
      background: var(--bg) !important;
    }
    .phone .island,
    .phone .home-indicator,
    .status-bar {
      display: none !important;
    }
    .screen {
      position: relative !important;
      inset: auto !important;
      width: 100%;
      height: 100%;
      padding-top: env(safe-area-inset-top, 0);
      padding-bottom: env(safe-area-inset-bottom, 0);
    }
    .content {
      overflow-y: auto !important;
      -webkit-overflow-scrolling: touch;
    }
  </style>
</head>

        <div class="content">

          <div class="header">

              <!-- S - miss -->
              <div class="day">
                <span class="dow">S</span>
                <span class="cell miss">
                  <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round">
                    <path d="M6 6l12 12M18 6l-12 12"/>
                  </svg>
                </span>
              </div>
              <!-- M - done -->
              <div class="day">
                <span class="dow">M</span>
                <span class="cell done">
                  <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M5 12l5 5L20 7"/>
                  </svg>
                </span>
              </div>
              <!-- T - done -->
              <div class="day">
                <span class="dow">T</span>
                <span class="cell done">
                  <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M5 12l5 5L20 7"/>
                  </svg>
                </span>
              </div>
              <!-- W - miss -->
              <div class="day">
                <span class="dow">W</span>
                <span class="cell miss">
                  <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round">
                    <path d="M6 6l12 12M18 6l-12 12"/>
                  </svg>
                </span>
              </div>
              <!-- T - today, done -->
              <div class="day today">
                <span class="dow">T</span>
                <span class="cell done">
                  <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M5 12l5 5L20 7"/>
                  </svg>
                </span>
              </div>
              <!-- F - future -->
              <div class="day future">
                <span class="dow">F</span>
                <span class="cell future">29</span>
              </div>
              <!-- S - future -->
              <div class="day future">
                <span class="dow">S</span>
                <span class="cell future">30</span>
              </div>
            </div>
          </div>

          <!-- Habit score -->
          <div class="habit-score" aria-label="Weekly habit score 50 percent">
            <div class="habit-row">
              <span class="habit-label">Habit score</span>
              <span class="habit-pct">50%</span>
            </div>
            <div class="habit-track">
              <div class="habit-fill"></div>
            </div>

  <style>
    #fs-hint {
      position: fixed; inset: 0; z-index: 99999;
      display: flex; align-items: center; justify-content: center;
      background: rgba(0,0,0,0.6);
      backdrop-filter: blur(4px); -webkit-backdrop-filter: blur(4px);
      color: #fff;
      font: 600 17px/1.4 -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
      text-align: center; padding: 24px;
      transition: opacity .25s ease;
    }
    #fs-hint.hide { opacity: 0; pointer-events: none; }
    #fs-hint .box {
      background: #1c1c1f;
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 16px;
      padding: 22px 26px;
      max-width: 340px;
    }
    #fs-hint .sub { color: #aaa; font-weight: 400; font-size: 14px; margin-top: 10px; }
    #fs-hint .dot { color: #E97A2F; }
    #fs-hint .share-ico {
      display: inline-block; vertical-align: -3px;
      width: 18px; height: 18px;
      margin: 0 2px;
    }
  </style>
  <div id="fs-hint">
    <div class="box" id="fs-hint-box">Loading...</div>
  </div>
  <script>
    (function () {
      var hint = document.getElementById('fs-hint');
      var box  = document.getElementById('fs-hint-box');

      var ua = navigator.userAgent || '';
      var isIOS = /iPad|iPhone|iPod/.test(ua) || (navigator.platform === 'MacIntel' && navigator.maxTouchPoints > 1);
      var inStandalone = (window.matchMedia && window.matchMedia('(display-mode: standalone)').matches) || window.navigator.standalone === true;

      if (inStandalone) {
        hint.parentNode.removeChild(hint);
        return;
      }

      if (isIOS) {
        box.innerHTML =
          'For fullscreen on iPhone <span class="dot">.</span><br>' +
          'Tap <svg class="share-ico" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">' +
          '<path d="M12 3v13"/><path d="M7 8l5-5 5 5"/><path d="M5 12v7a2 2 0 0 0 2 2h10a2 2 0 0 0 2-2v-7"/></svg>' +
          ' Share &rarr; "Add to Home Screen"' +
          '<div class="sub">Then launch it from the home icon. Tap anywhere to dismiss this hint.</div>';
        document.addEventListener('click', dismiss, true);
        document.addEventListener('touchend', dismiss, true);
        return;
      }

      box.innerHTML =
        'Tap anywhere for fullscreen <span class="dot">.</span>' +
        '<div class="sub">Hides browser bar &amp; system nav</div>';
      document.addEventListener('click', goFullscreen, true);
      document.addEventListener('touchend', goFullscreen, true);

      function goFullscreen() {
        var el = document.documentElement;
        var req = el.requestFullscreen || el.webkitRequestFullscreen || el.mozRequestFullScreen || el.msRequestFullscreen;
        if (req) { try { req.call(el); } catch (e) {} }
        if (screen.orientation && screen.orientation.lock) {
          try { screen.orientation.lock('portrait').catch(function(){}); } catch (e) {}
        }
        dismiss();
      }

      function dismiss() {
        hint.classList.add('hide');
        setTimeout(function(){ if (hint.parentNode) hint.parentNode.removeChild(hint); }, 300);
        document.removeEventListener('click', goFullscreen, true);
        document.removeEventListener('touchend', goFullscreen, true);
        document.removeEventListener('click', dismiss, true);
        document.removeEventListener('touchend', dismiss, true);
      }
    })();
  </script>
